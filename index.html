<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adivaaz - World Cup Jersey Store</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    /* HEADER */
    .header {
      background: black;
      color: gold;
      padding: 15px;
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
    }

    /* BANNER */
    .banner {
      background: url('https://images.unsplash.com/photo-1521412644187-c49fa049e84d') center;
      background-size: cover;
      padding: 60px;
      text-align: center;
      color: white;
    }

    .banner h1 {
      font-size: 32px;
    }

    /* PRODUCT GRID */
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .product-card {
      background: white;
      width: 260px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      text-align: center;
    }

    .product-card img {
      width: 100%;
      border-radius: 10px;
    }

    .price-old {
      text-decoration: line-through;
      color: red;
    }

    .price-new {
      color: green;
      font-size: 20px;
      font-weight: bold;
    }

    .btn {
      background: green;
      color: white;
      padding: 10px;
      border: none;
      margin-top: 10px;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn:hover {
      background: darkgreen;
    }

    /* FOOTER */
    .footer {
      background: black;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">⚽ Adivaaz Store</div>
    <p>World Cup Special Jersey Collection</p>
  </div>

  <!-- BANNER -->
  <div class="banner">
    <h1>🔥 World Cup Special Jersey Offer 🔥</h1>
    <p>Limited Time Discount</p>
  </div>

  <!-- PRODUCTS -->
  <div class="container">

    <!-- PRODUCT 1 -->
    <div class="product-card">
      <img src="932625856fa0a6ade0b606e06786c47d.jpg">
      <h3>Brazil Jersey</h3>
      <p class="price-old">599 BDT</p>
      <p class="price-new">499 BDT</p>
      <button class="btn" onclick="order()">Cash on Delivery Order</button>
    </div>

    <!-- PRODUCT 2 -->
    <div class="product-card">
      <img src="99e9c405e7fbf76b6bce650b657a326d.jpg">
      <h3>Argentina Jersey</h3>
      <p class="price-old">599 BDT</p>
      <p class="price-new">499 BDT</p>
      <button class="btn" onclick="order()">Cash on Delivery Order</button>
    </div>

    <!-- PRODUCT 3 -->
    <div class="product-card">
      <img src="f565629c57ec66f69106e8bbc240b911.jpg">
      <h3>Portugal Jersey</h3>
      <p class="price-old">599 BDT</p>
      <p class="price-new">499 BDT</p>
      <button class="btn" onclick="order()">Cash on Delivery Order</button>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 Adivaaz Store | World Cup Special Collection
  </div>

  <!-- ORDER SCRIPT -->
  <script>
    function order() {
      let name = prompt("Enter your Name:");
      let phone = prompt("Enter your Phone Number:");
      let address = prompt("Enter your Address:");

      if(name && phone && address){
        alert("Order Confirmed! We will contact you soon.");
      } else {
        alert("Please fill all details!");
      }
    }
  </script>

</body>
</html>
